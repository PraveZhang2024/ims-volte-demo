network:
  connect_timeout_seconds: 5

call:
  setup_timeout_seconds: 120
  local_display_name: "IMS Demo UE"

ims:
  register_expires: 600000
  compact_headers: true
  initial_authorization: true
  digest_res_encoding: "raw"
  contact_transport: "tcp"
  contact_features:
    - '+g.3gpp.accesstype="cellular2"'
    - '+g.3gpp.ps-data-off="inactive"'
    - "audio"
    - "+g.3gpp.nw-init-ussi"
    - "+g.3gpp.smsip"
    - "video"
    - '+g.3gpp.icsi-ref="urn%3Aurn-7%3A3gpp-service.ims.icsi.mmtel"'
    - '+sip.instance="<urn:gsma:imei:86608806-008621-0>"'
  security_client_algorithms:
    - "hmac-md5-96"
    - "hmac-sha-1-96"
  security_client_encryption_algorithms:
    - "des-ede3-cbc"
    - "aes-cbc"
    - "null"

media:
  codec: "AMR-WB"
  payload_type: 96
  clock_rate: 16000
  ptime_ms: 20
  octet_align: true
  send_file: "media_files/send.amr"
  receive_file: "media_files/received.amr"

debug:
  dump_sip: true
  dump_sdp: true
  dump_xfrm_commands: true
  execute_xfrm_commands: true
  capture_pcap: true
  command_timeout_seconds: 10
